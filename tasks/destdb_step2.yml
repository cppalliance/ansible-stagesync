---
- name: Print backup file name
  ansible.builtin.debug:
    var: stagesync_backupfilename

- name: Restore database
  become: true
  become_user: "{{ stagesync_backup_user }}"
  ansible.builtin.shell: |
    set -xe
    # Reset the target to an empty schema before restoring.
    #
    # We intentionally do NOT use "pg_restore --clean --if-exists". That mode
    # drops objects one at a time, which fails on a populated database whenever
    # a foreign key on another table depends on that index (Postgres
    # refuses the drop and would require CASCADE). Those failed drops then
    # cascade into "already exists", "duplicate key", "multiple primary keys"
    # and foreign-key errors.
    #
    # Dropping and recreating the public schema with CASCADE resolves every
    # interdependency at once and guarantees the restore lands in a clean,
    # empty schema that exactly matches the source dump.
    psql -d {{ stagesync_destdb }} -c 'DROP SCHEMA IF EXISTS public CASCADE'
    sleep 1
    psql -d {{ stagesync_destdb }} -c 'CREATE SCHEMA public'
    sleep 1
    psql -d {{ stagesync_destdb }} -c 'GRANT ALL ON SCHEMA public to public'
    sleep 1
    psql -d {{ stagesync_destdb }} -c 'GRANT ALL ON SCHEMA public to {{ stagesync_destdb_role }}'
    sleep 1
    pg_restore -d {{ stagesync_destdb }} --no-owner --role={{ stagesync_destdb_role }} "{{ stagesync_dest_tmp_dir }}/{{ stagesync_backupfilename }}"
  args:
    chdir: "{{ stagesync_dest_tmp_dir }}"
    executable: /bin/bash
  register: command_output
  changed_when: false

- name: Output of restore database
  ansible.builtin.debug:
    msg:
      - "{{ command_output.stdout }}"
      - "{{ command_output.stderr }}"

- name: Cleanup backup file from dest
  ansible.builtin.file:
    path: "{{ stagesync_dest_tmp_dir }}/{{ stagesync_backupfilename }}"
    state: absent
